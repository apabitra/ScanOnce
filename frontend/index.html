<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR File Share</title>
    <link rel="stylesheet" href="/frontend/styles.css">
  </head>
  <body>
    <main class="card shell">
      <h1>QR File Share</h1>
      <p class="hint">Upload a file under 500MB. You'll get a link and QR code — either one opens a PIN-protected download page.</p>
      <form id="upload-form" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <input type="password" name="pin" placeholder="PIN required for every upload" maxlength="12" class="pin-input" autocomplete="off">
        <button type="submit">Upload</button>
      </form>
      <div id="status-message" role="status"></div>
      <div class="progress-shell" id="upload-progress-shell">
        <div class="progress-bar" id="upload-progress-bar"></div>
      </div>
      <div class="progress-label" id="upload-progress-label"></div>
      <div id="share-notification" class="notification" role="status" aria-live="polite">
        <div class="label">Share details</div>
        <div class="label">Public URL</div>
        <div class="value" id="share-url"></div>
        <div class="label">PIN</div>
        <div class="value" id="share-pin-masked">••••</div>
        <span class="value" id="share-pin" style="display:none;"></span>
        <div class="label">QR code</div>
        <img id="share-qr" alt="QR code linking to the download portal" width="200" height="200">
        <div class="actions">
          <button type="button" onclick="copyText('share-url')">Copy URL</button>
          <button type="button" onclick="togglePinVisibility()" id="reveal-pin-btn">Reveal PIN</button>
          <button type="button" onclick="copyText('share-pin')">Copy PIN</button>
        </div>
        <div class="actions">
          <button type="button" onclick="shareCard()" id="share-btn">Share</button>
          <button type="button" onclick="downloadShareCard()">Download share card</button>
          <button type="button" class="secondary" onclick="dismissNotification()">Acknowledge</button>
        </div>
      </div>
      <p class="hint">Link works once — the file deletes itself right after it's downloaded, or after 1 hour if never opened.</p>
    </main>
    <script src="/frontend/app.js"></script>
  </body>
</html>
