<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Download portal</title>
    <link rel="stylesheet" href="/frontend/styles.css">
  </head>
  <body>
    <main class="card">
      <h2>__FILENAME__</h2>
      <p class="hint">Enter the PIN to download this file.</p>
      <form action="/portal/__FILE_ID__" method="post">
        <input type="text" name="pin" placeholder="Enter PIN" autofocus required>
        <button type="submit">Unlock &amp; download</button>
      </form>
    </main>
  </body>
</html>
